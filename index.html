    <style>
      /* Splash — visible before the React bundle mounts, removed by main.tsx. */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #faf7f0;
        transition: opacity 0.45s ease;
      }
      #splash.done {
        opacity: 0;
        pointer-events: none;
      }
      #splash .my-splash-mark {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        opacity: 0;
        transform: scale(0.94);
        animation: my-splash-fade 700ms cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
      }
      #splash svg .my-splash-ring {
        stroke-dasharray: 478;
        stroke-dashoffset: 478;
        animation: my-splash-draw 900ms ease-out forwards;
      }
      #splash svg .my-splash-ring-inner {
        stroke-dasharray: 428;
        stroke-dashoffset: 428;
        animation: my-splash-draw 900ms ease-out 100ms forwards;
      }
      #splash svg .my-splash-tick {
        opacity: 0;
        animation: my-splash-tick 500ms ease-out 650ms forwards;
      }
      #splash svg .my-splash-letters {
        opacity: 0;
        animation: my-splash-letters 600ms ease-out 400ms forwards;
      }
      #splash .my-splash-wordmark {
        color: #0d1e4f;
        font-family: 'Cinzel', Georgia, serif;
        font-size: 11px;
        letter-spacing: 0.32em;
        opacity: 0;
        animation: my-splash-letters 600ms ease-out 700ms forwards;
      }
      @keyframes my-splash-fade {
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes my-splash-draw {
        to {
          stroke-dashoffset: 0;
        }
      }
      @keyframes my-splash-tick {
        to {
          opacity: 1;
        }
      }
      @keyframes my-splash-letters {
        to {
          opacity: 1;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #splash .my-splash-mark,
        #splash svg .my-splash-ring,
        #splash svg .my-splash-ring-inner,
        #splash svg .my-splash-tick,
        #splash svg .my-splash-letters,
        #splash .my-splash-wordmark {
          animation: none;
          opacity: 1;
          transform: none;
          stroke-dashoffset: 0;
        }
      }
    </style>
